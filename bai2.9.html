.top {

.top img {

.center input[type="text"],

    margin-bottom: 10px;
    padding: 6px;
    border: 1px solid #90caf9;
}

.center textarea {
    height: 120px;
}

.center input[type="submit"]{
    background-color:#1e88e5;
    color: white;
    border: none; 
    padding: 6px 12px;
}

.center input[type="reset"] { 
    background-color: #90a4ae; 
    color: white; 
    border: none; 
    padding: 6px 12px;
}

.right ul {
    list-style: none;
}

.right li {

.right a {
    text-decoration:none;
